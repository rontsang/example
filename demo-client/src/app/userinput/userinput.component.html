<form [formGroup]="userForm" (ngSubmit)="onSubmit()">
  <input type="range" formControlName="tfsaAmount" [value]="sliderValue" (input)="onSliderChange($event)">
  <input type="number" formControlName="tfsaAmount" [value]="sliderValue" (input)="onTextChange($event)">

<!--  <p>Slider Value: {{ userForm.get('sliderControl').value }}</p>-->

  <!-- Slider Input -->
<!--  <input type="range" formControlName="tfsaAmount">-->

  <input type="text" formControlName="rrspAmount" placeholder="Input 2">
  <input type="text" formControlName="margAmountPrincipal" placeholder="Input 3">
  <input type="text" formControlName="margAmountCapitalGain" placeholder="Input 4">
  <input type="text" formControlName="interestRate" placeholder="Input 5">
  <input type="text" formControlName="amountPerYear" placeholder="Input 6">

  <select formControlName="province">
    <option *ngFor="let province of provinces" [value]="province">{{ province }}</option>
  </select>

  <button type="submit">{{ isSubmitted ? 'Recalculate' : 'Run' }}</button>
</form>
