<form [formGroup]="userForm" (ngSubmit)="onSubmit()">
  <label for="tfsaAmountNumber">TFSA Balance</label>
  <input #currencyInput appCurrencyFormat type="text" id="tfsaAmountNumber" formControlName="tfsaAmount">
  <input type="range" id="tfsaAmountRange" formControlName="tfsaAmount" [value]="sliderValue" (input)="onSliderChange($event)" min="0" max="2000000" step="10000">

  <label for="rrspAmount">RRSP Balance</label>
  <input appCurrencyFormat type="text" id="rrspAmount" formControlName="rrspAmount" placeholder="Input 2">

  <label for="margAmountPrincipal">Marginal Balance (Principal)</label>
  <input appCurrencyFormat type="text" id="margAmountPrincipal" formControlName="margAmountPrincipal" placeholder="Input 3">

  <label for="margAmountCapitalGain">Marginal Balance (Capital Gain)</label>
  <input appCurrencyFormat type="text" id="margAmountCapitalGain" formControlName="margAmountCapitalGain" placeholder="Input 4">

  <label for="interestRate">Interest Rate</label>
  <input type="text" id="interestRate" formControlName="interestRate" placeholder="Input 5">

  <label for="amountPerYear">Amount Per Year</label>
  <input appCurrencyFormat type="text" id="amountPerYear" formControlName="amountPerYear" placeholder="Input 6">

  <label for="provinceSelect">Province</label>
  <select id="provinceSelect" formControlName="province">
    <option *ngFor="let province of provinces" [value]="province">{{ province }}</option>
  </select>

  <button type="submit">{{ isSubmitted ? 'Recalculate' : 'Run' }}</button>
</form>
