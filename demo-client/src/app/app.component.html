<header class="top-banner">
  <div class="header-content">
    <div class="logo-nav">
      <span class="site-name">nestegg.org</span>
    </div>
    <div class="actions">
      <a href="https://rontsang.github.io/example/documentation.html" target="_blank" rel="noopener noreferrer" class="signin-btn" style="text-decoration: none; display: inline-flex; align-items: center;">Documentation</a>
      <a href="https://buymeacoffee.com/rontsang" target="_blank" rel="noopener noreferrer" class="signin-btn coffee-btn" style="text-decoration: none; display: inline-flex; align-items: center; gap: 6px;">
        <span class="coffee-emoji">☕</span> Buy me a coffee
      </a>
      <button class="signin-btn">Sign in</button>
      <button class="settings-btn" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="settings-icon">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
  </div>
</header>
<div class="container" 
     [class.mobile-input-view]="activeMobileView === 'input'" 
     [class.mobile-output-view]="activeMobileView === 'output'">
<!--    <mat-slider [(ngModel)]="currentValue"></mat-slider>-->
  <app-userinput></app-userinput>
  <div class="output-wrapper">
    <button class="back-to-input-btn" (click)="switchToInputView()">
      &larr; Return to Input
    </button>
    <app-displaywindow #displayWindow></app-displaywindow>
  </div>
</div>
